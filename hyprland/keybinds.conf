# Lines ending with `# [hidden]` won't be shown on cheatsheet
# Lines starting with #! are section headings

# DO NOT REMOVE THIS EXEC OR YOU WON'T BE ABLE TO USE ANY KEYBIND
exec = hyprctl dispatch submap global
# This is required for catchall to work
submap = global

#!
##! Shell
# These absolutely need to be on top, or they won't work consistently
bindid = Alt, Alt_L, Toggle search, global, quickshell:searchToggleRelease # Toggle search
bindid = Alt, Alt_R, Toggle search, global, quickshell:searchToggleRelease # [hidden] Toggle search
bind = Alt, Alt_L, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || fuzzel # [hidden] Launcher (fallback)
bind = Alt, Space, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || fuzzel # [hidden] Launcher (fallback)
binditn = Alt, catchall, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Ctrl, Alt_L, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Ctrl, Alt_R, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Alt, mouse:272, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Alt, mouse:273, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Alt, mouse:274, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Alt, mouse:275, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Alt, mouse:276, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Alt, mouse:277, global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Alt, mouse_up,  global, quickshell:searchToggleReleaseInterrupt # [hidden]
bind = Alt, mouse_down,global, quickshell:searchToggleReleaseInterrupt # [hidden]

bindit = ,Alt_L, global, quickshell:workspaceNumber # [hidden]
bindit = ,Alt_R, global, quickshell:workspaceNumber # [hidden]
bind = Alt, Tab, global, quickshell:overviewWorkspacesToggle # Toggle overview
bindd = Alt, V, Clipboard history >> clipboard, global, quickshell:overviewClipboardToggle # Clipboard history >> clipboard
bindd = Alt, Period, Emoji >> clipboard, global, quickshell:overviewEmojiToggle # Emoji >> clipboard
bind = Alt, A, global, quickshell:sidebarLeftToggle # Toggle left sidebar
bind = Alt+Alt, A, global, quickshell:sidebarLeftToggleDetach # [hidden]
bind = Alt, B, global, quickshell:sidebarLeftToggle # [hidden]
bind = Alt, O, global, quickshell:sidebarLeftToggle # [hidden]
bindd = Alt, N, Toggle right sidebar, global, quickshell:sidebarRightToggle # Toggle right sidebar
bindd = Alt, Slash, Toggle cheatsheet, global, quickshell:cheatsheetToggle # Toggle cheatsheet
# bindd = Alt, K, Toggle on-screen keyboard, global, quickshell:oskToggle # Toggle on-screen keyboard
bindd = Alt, M, Toggle media controls, global, quickshell:mediaControlsToggle # Toggle media controls
bind = Alt, G, global, quickshell:overlayToggle # Toggle overlay
bindd = Ctrl+Alt, Delete, Toggle session menu, global, quickshell:sessionToggle # Toggle session menu
bindd = Alt+Ctrl, J, Toggle bar, global, quickshell:barToggle # Toggle bar
bind = Ctrl+Alt, Delete, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill wlogout || wlogout -p layer-shell # [hidden] Session menu (fallback)
bind = Shift+Alt+Alt, Slash, exec, qs -p ~/.config/quickshell/$qsConfig/welcome.qml # [hidden] Launch welcome app

bindle=, XF86MonBrightnessUp, exec, qs -c $qsConfig ipc call brightness increment || brightnessctl s 5%+ # [hidden]
bindle=, XF86MonBrightnessDown, exec, qs -c $qsConfig ipc call brightness decrement || brightnessctl s 5%- # [hidden]
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5# [hidden]
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- # [hidden]

bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]
bindld = Alt+Shift,M, Toggle mute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]
bindl = Alt ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
bindl = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
bindld = Alt+Alt,M, Toggle mic, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
bindd = Ctrl+Alt, T, Toggle wallpaper selector, global, quickshell:wallpaperSelectorToggle # Wallpaper selector
bindd = Ctrl+Alt+Alt, T, Select random wallpaper, global, quickshell:wallpaperSelectorRandom # Random wallpaper
bindd = Ctrl+Alt, T, Change wallpaper, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/colors/switchwall.sh # [hidden] Change wallpaper (fallback)
bind = Ctrl+Alt, R, exec, killall ydotool qs quickshell; qs -c $qsConfig & # Restart widgets
bind = Ctrl+Alt, P, global, quickshell:panelFamilyCycle # Cycle panel family

##! Utilities
# Screenshot, Record, OCR, Color picker, Clipboard history
bindd = Alt, V, Copy clipboard history entry, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || cliphist list | fuzzel --match-mode fzf --dmenu | cliphist decode | wl-copy # [hidden] Clipboard history >> clipboard (fallback)
bindd = Alt, Period, Copy an emoji, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || ~/.config/hypr/hyprland/scripts/fuzzel-emoji.sh copy # [hidden] Emoji >> clipboard (fallback)
bind = Alt+Shift, S, global, quickshell:regionScreenshot # Screen snip
bind = Alt+Shift, S, exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || hyprshot --freeze --clipboard-only --mode region --silent # [hidden] Screen snip (fallback)
bind = Alt+Shift, A, global, quickshell:regionSearch # Google Lens
bind = Alt+Shift, A, exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || ~/.config/hypr/hyprland/scripts/snip_to_search.sh # [hidden] Google Lens (fallback)
# OCR
bind = Alt+Shift, X, global, quickshell:regionOcr # Character recognition >> clipboard
bind = Alt+Shift, T, global, quickshell:screenTranslate # Translate screen content
bind = Alt+Shift, X,exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || grim -g "$(slurp $SLURP_ARGS)" "/tmp/ocr_image.png" && tesseract "/tmp/ocr_image.png" stdout -l $(tesseract --list-langs | awk 'NR>1{print $1}' | tr '\\n' '+' | sed 's/\\+$/\\n/') | wl-copy && rm "/tmp/ocr_image.png" # [hidden]
# Color picker
bindd = Alt+Shift, C, Color picker, exec, hyprpicker -a # Pick color (Hex) >> clipboard
# Recording stuff
bindl = Alt+Shift, R, global, quickshell:regionRecord # Record region (no sound)
bindl = Alt+Shift, R, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/videos/record.sh # [hidden] Record region (no sound) (fallback)
bindl = Alt+Alt, R, global, quickshell:regionRecord # [hidden] Record region (no sound)
bindl = Alt+Alt, R, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/videos/record.sh # [hidden] Record region (no sound) (fallback)
bindl = Ctrl+Alt, R, exec, ~/.config/quickshell/$qsConfig/scripts/videos/record.sh --fullscreen # [hidden] Record screen (no sound)
bindl = Alt+Shift+Alt, R, exec, ~/.config/quickshell/$qsConfig/scripts/videos/record.sh --fullscreen --sound # Record screen (with sound)
# Fullscreen screenshot
bindl = ,Print,exec,grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" - | wl-copy # Screenshot >> clipboard
bindln = Ctrl,Print, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" $(xdg-user-dir PICTURES)/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png # Screenshot >> clipboard & file
bindln = Ctrl,Print,exec,grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" - | wl-copy # [hidden] Screenshot >> clipboard & file (clipboard)
# AI
bindd = Alt+Shift+Alt, mouse:273, Generate AI summary for selected text, exec, ~/.config/hypr/hyprland/scripts/ai/primary-buffer-query.sh # [hidden] AI summary for selected text (requires a running ollama model)

